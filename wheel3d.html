<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NUT Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06040a;--gold:#c9a227;--gold2:#f0d060;--gold3:#8b6914;
  --green:#00e701;--red:#ff4f4f;--text:#f0e8d8;--muted:#6a5a48;
  --label:#b09070;--sans:'Inter',sans-serif;--mono:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;user-select:none;}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative;}

/* HEADER */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;flex-shrink:0;background:rgba(0,0,0,0.5);
  border-bottom:1px solid rgba(201,162,39,0.18);
}
.hdr-brand{font-size:13px;font-weight:900;letter-spacing:.05em;color:var(--gold);}
#balDisplay{
  background:rgba(201,162,39,0.1);border:1px solid rgba(201,162,39,0.35);
  border-radius:7px;padding:3px 10px;font-size:11px;font-weight:700;
  color:var(--gold);font-family:var(--mono);
}
#hdrClose{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:var(--muted);font-size:13px;cursor:pointer;
  width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
}
#hdrClose:hover{color:var(--text);}

/* RANK BAR */
#rankBar{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 14px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.04);
  flex-shrink:0;gap:10px;
}
#rankBadge{font-size:11px;}
#rankLevel{font-size:8.5px;font-family:var(--mono);color:var(--muted);flex:1;text-align:right;letter-spacing:.06em;text-transform:uppercase;}

/* VIEWPORT */
#viewport{
  flex:1;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%, #1a0e04 0%, #06040a 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:0;gap:0;
}

/* 3D WHEEL STAGE */
.w3d{
  perspective:700px;
  perspective-origin:50% -15%;
  flex-shrink:0;
}
.wt{
  transform:rotateX(42deg);
  transform-origin:center center;
  position:relative;
  line-height:0;
}
#wc{
  border-radius:50%;
  display:block;
  /* Near-edge gold rim visible through perspective */
  box-shadow:
    0 0 0 9px #6a4208,
    0 0 0 13px #c9a227,
    0 0 0 17px #4a2c04,
    0 12px 0 17px rgba(0,0,0,0.7),
    0 0 80px rgba(201,162,39,0.25),
    0 0 140px rgba(100,60,10,0.3);
}
/* Gloss overlay on the wheel face */
.wt::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse at 45% 28%, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0) 65%);
  pointer-events:none;z-index:2;
}
/* Felt table surface illusion below wheel */
.felt{
  width:100%;height:40px;
  background:radial-gradient(ellipse at 50% 0%, rgba(20,10,2,0.9) 0%, transparent 100%);
  flex-shrink:0;
  margin-top:-6px;
}

/* POINTER — static, points at the near edge (bottom of tilted canvas) */
.ptr-row{
  display:flex;justify-content:center;
  position:absolute;
  /* position just below visual near edge of tilted wheel; adjusted via JS */
  left:0;right:0;
  z-index:10;
}
.ptr{
  width:0;height:0;
  border-left:13px solid transparent;
  border-right:13px solid transparent;
  border-top:22px solid #f0d060;
  filter:drop-shadow(0 -4px 10px rgba(240,208,96,0.7));
}
.ptr-shaft{
  position:absolute;
  top:0;left:50%;
  width:5px;height:18px;
  background:linear-gradient(180deg,#f0d060,#8b6914);
  border-radius:2px;
  transform:translateX(-50%) translateY(-100%);
  filter:drop-shadow(0 0 6px rgba(240,208,96,0.5));
}

/* RESULT OVERLAY */
#resultOverlay{
  position:absolute;inset:0;background:rgba(4,2,8,0.78);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;z-index:30;pointer-events:none;
}
#resultOverlay.show{display:flex;}
#resultBig{
  font-family:var(--mono);font-size:clamp(32px,9vw,52px);font-weight:700;
  line-height:1;text-align:center;
}
#resultBig.win{color:var(--green);text-shadow:0 0 40px rgba(0,231,1,0.7);}
#resultBig.bust{color:var(--red);text-shadow:0 0 30px rgba(255,79,79,0.5);}
#resultBig.jackpot{
  color:var(--gold2);text-shadow:0 0 60px rgba(240,208,96,0.9);
  animation:jpPulse .6s ease-in-out infinite alternate;
}
@keyframes jpPulse{0%{text-shadow:0 0 40px rgba(240,208,96,0.7);}100%{text-shadow:0 0 80px rgba(240,208,96,1),0 0 120px rgba(240,208,96,0.5);}}
#resultSub{font-size:14px;font-weight:700;color:var(--label);}

/* STATUS BAR */
#wheelStatus{
  position:absolute;bottom:4px;left:0;right:0;
  text-align:center;font-size:10px;font-weight:700;
  color:var(--muted);letter-spacing:.08em;pointer-events:none;
}

/* BET CONTROLS */
#betControls{
  flex-shrink:0;padding:10px 14px 12px;background:rgba(0,0,0,0.45);
  border-top:1px solid rgba(255,255,255,0.05);
}
.bet-row{display:grid;grid-template-columns:38px 1fr 38px 60px;gap:6px;margin-bottom:6px;align-items:center;}
.adj{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:var(--text);border-radius:8px;width:38px;height:38px;font-size:20px;font-weight:900;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--sans);
}
.adj:hover{background:rgba(255,255,255,0.14);}
.bet-box{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  border-radius:8px;padding:4px 8px;text-align:center;
}
.bet-lbl{display:block;font-size:7.5px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:1px;}
.bet-num{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--gold);}
.max-btn{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:var(--label);border-radius:8px;height:38px;font-size:9px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);width:100%;
}
.max-btn:hover{background:rgba(201,162,39,0.15);color:var(--gold);}
.quick-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.quick-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  color:var(--label);border-radius:8px;padding:6px;font-size:12px;font-weight:800;
  cursor:pointer;font-family:var(--sans);
}
.quick-btn:hover{background:rgba(201,162,39,0.12);color:var(--gold);}
#spinBtn{
  width:100%;background:linear-gradient(180deg,#c9a227,#7a5a08);
  border:none;color:#000;border-radius:10px;padding:14px;
  font-size:14px;font-weight:900;letter-spacing:.07em;font-family:var(--sans);
  cursor:pointer;text-transform:uppercase;
  box-shadow:0 4px 20px rgba(201,162,39,0.35);transition:opacity .12s;
}
#spinBtn:disabled{opacity:.3;cursor:default;}
#spinBtn:not(:disabled):hover{opacity:.88;}
#spinBtn:not(:disabled):active{opacity:.7;}

/* BROKE MSG */
#brokeMsg{
  position:absolute;inset:0;background:rgba(6,4,10,0.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;text-align:center;padding:24px;z-index:40;
}
#brokeMsg.show{display:flex;}
.broke-title{font-size:20px;font-weight:900;}
.broke-sub{font-size:12px;color:var(--muted);}
.broke-btn{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:var(--text);border-radius:10px;padding:10px 20px;font-size:13px;
  font-weight:700;cursor:pointer;font-family:var(--sans);
}
.broke-btn:hover{background:rgba(255,255,255,0.14);}

/* PARTICLES (CSS) */
.spark{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:sparkAnim 1.1s ease-out forwards;
}
@keyframes sparkAnim{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{opacity:0;}
}
</style>
</head>
<body>
<div id="app">

  <div id="hdr">
    <span class="hdr-brand">🎡 NUT WHEEL</span>
    <span id="balDisplay">0 NUTTOKENS</span>
    <button id="hdrClose" onclick="closeGame()">✕</button>
  </div>

  <div id="rankBar">
    <span id="rankBadge"></span>
    <span id="rankLevel"></span>
  </div>

  <div id="viewport">
    <div class="w3d">
      <div class="wt">
        <canvas id="wc"></canvas>
      </div>
    </div>
    <div class="ptr-row" id="ptrRow">
      <div style="position:relative;">
        <div class="ptr-shaft"></div>
        <div class="ptr"></div>
      </div>
    </div>
    <div class="felt"></div>

    <div id="wheelStatus">PLACE YOUR BET AND SPIN</div>
    <div id="resultOverlay">
      <div id="resultBig"></div>
      <div id="resultSub"></div>
    </div>
    <div id="brokeMsg">
      <div class="broke-title">🪙 Out of NUTTOKENS</div>
      <div class="broke-sub">Click nuts on the main page to get more chips.</div>
      <button class="broke-btn" onclick="closeGame()">Back to Clicker</button>
      <button class="broke-btn" onclick="document.getElementById('brokeMsg').classList.remove('show')">Dismiss</button>
    </div>
  </div>

  <div id="betControls">
    <div class="bet-row">
      <button class="adj" onclick="adjBet(-50)">−</button>
      <div class="bet-box">
        <span class="bet-lbl">Bet Amount</span>
        <span class="bet-num" id="betAmt">50</span>
      </div>
      <button class="adj" onclick="adjBet(50)">+</button>
      <button class="max-btn" onclick="setBetMax()">MAX</button>
    </div>
    <div class="quick-row">
      <button class="quick-btn" onclick="adjBetMult(0.5)">½ Half</button>
      <button class="quick-btn" onclick="adjBetMult(2)">2× Double</button>
    </div>
    <button id="spinBtn" onclick="startSpin()">SPIN THE WHEEL</button>
  </div>

</div>

<script src="./nutrank.js"></script>
<script>
// ─── Config ────────────────────────────────────────────────────
const KEY_BAL     = 'nut_pm_bal_v1'
const KEY_ALLTIME = 'nut_alltime_v1'

// ─── Balance / Rank ────────────────────────────────────────────
function getBal()    { return Math.max(0, parseInt(localStorage.getItem(KEY_BAL)||'0',10)||0) }
function getAllTime() { return parseInt(localStorage.getItem(KEY_ALLTIME)||'0',10)||0 }
function setBal(n) {
  const v = Math.max(0, Math.floor(n))
  localStorage.setItem(KEY_BAL, String(v))
  document.getElementById('balDisplay').textContent = v.toLocaleString() + ' NUTTOKENS'
  window.parent && window.parent.postMessage({ type:'casino:balance', balance:v }, '*')
  return v
}
function closeGame() {
  window.parent && window.parent.postMessage({ type:'casino:close' }, '*')
  window.location.href = './index.html'
}

let nutCount = getAllTime()
let rank     = window.NutRank ? NutRank.getRank(nutCount) : { level:0 }
let segments = window.NutRank ? NutRank.getWheelSegments(rank.level) : []

function refreshRankDisplay() {
  nutCount = getAllTime()
  rank     = NutRank.getRank(nutCount)
  segments = NutRank.getWheelSegments(rank.level)
  const badgeEl = document.getElementById('rankBadge')
  const levelEl = document.getElementById('rankLevel')
  if (badgeEl) badgeEl.innerHTML = NutRank.getBadgeHTML(nutCount)
  if (levelEl) levelEl.textContent = nutCount.toLocaleString() + ' nuts total'
  return segments
}

// ─── Bet ───────────────────────────────────────────────────────
let bet = Math.min(50, Math.max(1, getBal()))
function refreshBetDisplay() { document.getElementById('betAmt').textContent = bet.toLocaleString() }
function adjBet(d) {
  const bal = getBal()
  bet = Math.max(1, Math.min(bal||1, bet+d))
  refreshBetDisplay()
}
function setBetMax() { bet = Math.max(1, getBal()); refreshBetDisplay() }
function adjBetMult(m) {
  const bal = getBal()
  bet = m < 1 ? Math.max(1, Math.floor(bet*m)) : Math.min(bal||1, Math.floor(bet*m))
  refreshBetDisplay()
}

// ─── Canvas Setup ──────────────────────────────────────────────
const wc  = document.getElementById('wc')
const ctx = wc.getContext('2d')
let   WCS = 0  // canvas pixel size (square)

function sizeCanvas() {
  const vp = document.getElementById('viewport')
  // Fit inside viewport, accounting for tilt making it appear narrower
  const avail = Math.min(vp.clientWidth * 0.88, vp.clientHeight * 0.72, 310)
  WCS = Math.floor(avail)
  wc.width = wc.height = WCS
  // Position the pointer just below the visual near edge
  positionPointer()
}

function positionPointer() {
  // With perspective:700px rotateX(42deg), near edge of canvas appears
  // roughly at: y_center + radius * cos(42°) * perspective_correction
  // Approximate: near edge drops ~38% below the canvas center visually
  const ptrRow = document.getElementById('ptrRow')
  const wt = document.querySelector('.wt')
  const rect = wt.getBoundingClientRect()
  const vpRect = document.getElementById('viewport').getBoundingClientRect()
  // Position pointer row at the bottom of the tilted canvas visual bounds
  ptrRow.style.top = (rect.bottom - vpRect.top - 6) + 'px'
}

// ─── Draw Wheel ────────────────────────────────────────────────
function lerpColor(a, b, t) {
  const ah=a.replace('#',''), bh=b.replace('#','')
  const r=(v=>v.toString(16).padStart(2,'0'))
  const n=s=>parseInt(s.slice(0,2),16)
  const r1=parseInt(ah.slice(0,2),16),g1=parseInt(ah.slice(2,4),16),b1=parseInt(ah.slice(4,6),16)
  const r2=parseInt(bh.slice(0,2),16),g2=parseInt(bh.slice(2,4),16),b2=parseInt(bh.slice(4,6),16)
  return '#'+[r1+t*(r2-r1),g1+t*(g2-g1),b1+t*(b2-b1)].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('')
}

function drawWheel(segs, hlIdx, rot) {
  if (!segs || !segs.length) return
  const S=WCS, cx=S/2, cy=S/2
  const outerR=S*0.465, innerR=S*0.065
  const n=segs.length, arc=(Math.PI*2)/n

  ctx.clearRect(0,0,S,S)

  // Apply rotation around canvas center
  ctx.save()
  ctx.translate(cx,cy)
  ctx.rotate(rot||0)
  ctx.translate(-cx,-cy)

  // Outer shadow ring
  ctx.beginPath(); ctx.arc(cx,cy,outerR+10,0,Math.PI*2)
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fill()

  // Segments
  for (let i=0; i<n; i++) {
    const seg=segs[i]
    const startA=-Math.PI/2 + i*arc
    const endA=startA+arc
    const midA=startA+arc/2
    const isHL=(i===hlIdx)

    ctx.beginPath()
    ctx.moveTo(cx+innerR*Math.cos(startA), cy+innerR*Math.sin(startA))
    ctx.arc(cx,cy,outerR,startA,endA)
    ctx.arc(cx,cy,innerR,endA,startA,true)
    ctx.closePath()

    // Radial gradient fill
    const gx=cx+outerR*0.55*Math.cos(midA), gy=cy+outerR*0.55*Math.sin(midA)
    const grad=ctx.createRadialGradient(gx,gy,0,cx,cy,outerR)
    grad.addColorStop(0, lerpColor(seg.color,'#ffffff',0.2))
    grad.addColorStop(0.5, seg.color)
    grad.addColorStop(1, lerpColor(seg.color,'#000000',0.55))
    ctx.fillStyle=grad; ctx.fill()
    if (isHL) { ctx.fillStyle='rgba(255,245,140,0.32)'; ctx.fill() }

    // Segment border
    ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=2; ctx.stroke()

    // Label
    const textR=(outerR+innerR)*0.54
    const tx=cx+textR*Math.cos(midA), ty=cy+textR*Math.sin(midA)
    ctx.save()
    ctx.translate(tx,ty)
    ctx.rotate(midA+Math.PI/2)
    ctx.shadowColor='rgba(0,0,0,0.95)'; ctx.shadowBlur=7
    ctx.fillStyle=seg.textColor||'#ffffff'
    const fs=Math.round(S*(seg.label.length>4?0.038:0.046))
    ctx.font=`900 ${fs}px 'Space Mono',monospace`
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(seg.label,0,0)
    ctx.restore()

    // Gold pin at segment border
    const pinR=outerR*0.93
    const pinX=cx+pinR*Math.cos(startA), pinY=cy+pinR*Math.sin(startA)
    ctx.beginPath(); ctx.arc(pinX,pinY,5,0,Math.PI*2)
    const pg=ctx.createRadialGradient(pinX-1,pinY-1,0,pinX,pinY,5)
    pg.addColorStop(0,'#f0d060'); pg.addColorStop(1,'#8b6914')
    ctx.fillStyle=pg; ctx.fill()
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke()
  }

  // Spoke dividers
  for (let i=0;i<n;i++) {
    const a=-Math.PI/2+i*arc
    ctx.beginPath()
    ctx.moveTo(cx+innerR*1.1*Math.cos(a), cy+innerR*1.1*Math.sin(a))
    ctx.lineTo(cx+outerR*0.94*Math.cos(a), cy+outerR*0.94*Math.sin(a))
    ctx.strokeStyle='rgba(201,162,39,0.28)'; ctx.lineWidth=1.5; ctx.stroke()
  }

  // Outer decorative ring
  ctx.beginPath(); ctx.arc(cx,cy,outerR,0,Math.PI*2)
  const rg=ctx.createLinearGradient(0,0,S,S)
  rg.addColorStop(0,'rgba(201,162,39,0.5)')
  rg.addColorStop(0.5,'rgba(255,220,80,0.7)')
  rg.addColorStop(1,'rgba(201,162,39,0.5)')
  ctx.strokeStyle=rg; ctx.lineWidth=4; ctx.stroke()

  // Center hub
  const hubR=innerR*1.18
  const hg=ctx.createRadialGradient(cx-S*0.01,cy-S*0.01,0,cx,cy,hubR)
  hg.addColorStop(0,'#e8c040'); hg.addColorStop(0.4,'#a07820'); hg.addColorStop(1,'#402800')
  ctx.beginPath(); ctx.arc(cx,cy,hubR,0,Math.PI*2)
  ctx.fillStyle=hg; ctx.fill()
  ctx.strokeStyle='rgba(255,220,80,0.55)'; ctx.lineWidth=3; ctx.stroke()

  ctx.restore()

  // Center nut emoji (drawn after restore so it doesn't rotate)
  ctx.shadowBlur=0
  const eSize=Math.round(hubR*0.85)
  ctx.font=`${eSize}px serif`
  ctx.textAlign='center'; ctx.textBaseline='middle'
  ctx.fillText('🥜', cx, cy+1)
}

// ─── Spin State ────────────────────────────────────────────────
// Pointer is at BOTTOM of canvas (angle = π/2 from canvas top)
// Segment i center (unrotated) = -π/2 + (i+0.5)*arc
// Win condition: (-π/2 + (winnerIdx+0.5)*arc) + rot = π/2
// → rot_target = π - (winnerIdx+0.5)*arc

const POINTER_ANGLE = Math.PI / 2  // bottom
const TAU = Math.PI * 2
let rot       = 0
let spinFrom  = 0
let spinTo    = 0
let spinStart = 0
let spinning  = false
let idleDrift = 0
const SPIN_DUR = 5200

function easeOutQuint(t) { return 1 - Math.pow(1-t, 5) }

function startSpin() {
  if (spinning) return
  const bal=getBal()
  if (bal<1||bet<1) { document.getElementById('brokeMsg').classList.add('show'); return }
  const actualBet=Math.min(bet,bal)
  setBal(bal-actualBet)

  segments=refreshRankDisplay()
  const n=segments.length
  const arc=TAU/n
  const winnerIdx=NutRank.pickWeighted(segments)
  const winner=segments[winnerIdx]

  // Compute target rotation
  const segCenter=-Math.PI/2+(winnerIdx+0.5)*arc
  const rotTarget=POINTER_ANGLE-segCenter  // basic target

  // Normalize both to [0, TAU)
  const tNorm=((rotTarget%TAU)+TAU)%TAU
  const cNorm=((rot%TAU)+TAU)%TAU
  let delta=(tNorm-cNorm+TAU)%TAU
  if (delta<0.25) delta+=TAU

  const spins=8+Math.floor(Math.random()*4)
  spinFrom=rot
  spinTo=rot+spins*TAU+delta
  spinStart=performance.now()
  spinning=true
  idleDrift=0

  document.getElementById('resultOverlay').classList.remove('show')
  document.getElementById('brokeMsg').classList.remove('show')
  document.getElementById('spinBtn').disabled=true
  setStatus('')

  // Resolve after spin
  setTimeout(() => {
    spinning=false
    rot=spinTo

    drawWheel(segments, winnerIdx, rot)

    const mult=winner.mult
    const payout=mult>0?Math.floor(actualBet*mult):0
    const profit=payout-actualBet

    if (mult>0) setBal(getBal()+payout)

    const rb=document.getElementById('resultBig')
    const rs=document.getElementById('resultSub')
    rb.className=mult>=25?'jackpot':mult>0?'win':'bust'
    rb.textContent=mult>0?winner.label:'BUST'
    rs.textContent=mult>0
      ? '+'+profit.toLocaleString()+' NUTTOKENS'
      : String.fromCharCode(8722)+actualBet.toLocaleString()+' NUTTOKENS'
    document.getElementById('resultOverlay').classList.add('show')

    if (mult>=25) spawnSparks(0xffd060, 80)
    else if (mult>0) spawnSparks(0x00e701, 40)

    setTimeout(() => {
      document.getElementById('resultOverlay').classList.remove('show')
      drawWheel(segments,-1,rot)
      document.getElementById('spinBtn').disabled=false
      setStatus('SPIN AGAIN')
      if (getBal()<1) setTimeout(()=>document.getElementById('brokeMsg').classList.add('show'),400)
    }, mult>=25?4500:2800)
  }, SPIN_DUR+100)
}

// ─── Spark Particles ───────────────────────────────────────────
function spawnSparks(colorHex, count) {
  const vp=document.getElementById('viewport')
  const c='#'+colorHex.toString(16).padStart(6,'0')
  for (let i=0;i<count;i++) {
    const el=document.createElement('div')
    el.className='spark'
    const sz=4+Math.random()*8
    el.style.cssText=`
      width:${sz}px;height:${sz}px;background:${c};
      left:${30+Math.random()*40}%;top:${20+Math.random()*40}%;
      animation-duration:${0.7+Math.random()*0.8}s;
      animation-delay:${Math.random()*0.3}s;
    `
    const dx=(Math.random()-0.5)*200, dy=-60-Math.random()*180
    el.style.setProperty('--dx',dx+'px')
    el.style.setProperty('--dy',dy+'px')
    el.style.animation=`none`
    vp.appendChild(el)
    setTimeout(()=>el.style.animation=
      `sparkAnim ${0.7+Math.random()*0.8}s ease-out ${Math.random()*0.3}s forwards`
    ,10)
    setTimeout(()=>el.remove(),1400)
  }
}
// Override sparkAnim to use custom dx/dy
const sparkStyle=document.createElement('style')
sparkStyle.textContent=`.spark{--dx:0px;--dy:-100px;}`
document.head.appendChild(sparkStyle)

// ─── Status ────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('wheelStatus').textContent=msg||'PLACE YOUR BET AND SPIN'
}

// ─── Render Loop ───────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate)
  if (spinning) {
    const now=performance.now()
    const t=Math.min(1,(now-spinStart)/SPIN_DUR)
    rot=spinFrom+(spinTo-spinFrom)*easeOutQuint(t)
    drawWheel(segments,-1,rot)
  } else {
    // Gentle idle drift
    idleDrift+=0.0008
    drawWheel(segments,-1,rot+idleDrift)
  }
}

// ─── Init ──────────────────────────────────────────────────────
sizeCanvas()
refreshRankDisplay()
setBal(getBal())
bet=Math.min(50,Math.max(1,getBal()))
refreshBetDisplay()
setStatus('PLACE YOUR BET AND SPIN')
drawWheel(segments,-1,rot)
animate()

window.addEventListener('resize',()=>{
  sizeCanvas()
  drawWheel(segments,-1,rot)
})
window.addEventListener('storage', e=>{
  if (e.key===KEY_BAL||e.key===KEY_ALLTIME) { setBal(getBal()); refreshRankDisplay() }
})
</script>
