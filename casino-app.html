<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NUT Casino</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#06040a;overflow:hidden;}
iframe{display:block;width:100%;height:100%;border:none;}
</style>
</head>
<body>
<iframe id="wf" src="./wheel3d.html"></iframe>
<script>
// Forward all postMessages from wheel3d up to the parent (index.html overlay)
window.addEventListener('message', e => {
  if (!e.data) return
  if (window.parent !== window) window.parent.postMessage(e.data, '*')
})
</script>
</body>
</html>
