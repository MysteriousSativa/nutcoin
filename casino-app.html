<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NUT Casino</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#06040a;overflow:hidden;}
iframe{display:block;width:100%;height:100%;border:none;}
</style>
</head>
<body>
<iframe id="wf" src="./wheel3d.html"></iframe>
<script>
// Forward messages between parent ↔ wheel iframe
window.addEventListener('message', e => {
  if (!e.data) return
  const wf = document.getElementById('wf')
  if (window.parent !== window && e.source === window.parent) {
    if (wf && wf.contentWindow) wf.contentWindow.postMessage(e.data, '*')
    return
  }
  if (window.parent !== window) window.parent.postMessage(e.data, '*')
})

const tut = new URLSearchParams(location.search).get('tutorial') === '1'
document.getElementById('wf').src = './wheel3d.html' + (tut ? '?tutorial=1' : '')
</script>
</body>
</html>
