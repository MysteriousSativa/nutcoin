<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$NUT Profile</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml"/>
  <link rel="icon" href="/img/favicon.ico" sizes="any"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <style>
    :root{--bg:#050301;--cream:#FFF8EE;--gold:#C8A96E;--gold-bright:#FFD97D;--muted:#7A6855;--border:rgba(200,169,110,0.22);--green:#4EC97A;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--cream);font-family:system-ui,-apple-system,Segoe UI,Inter,sans-serif;min-height:100vh;}
    .nut-home-bar{position:sticky;top:0;z-index:600;display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(4,2,0,0.97);border-bottom:1px solid rgba(200,169,110,0.3);}
    .nut-home-btn{padding:8px 14px;border-radius:10px;border:1px solid rgba(200,169,110,0.35);background:rgba(200,100,10,0.12);color:var(--gold-bright);font-weight:800;font-size:11px;letter-spacing:.06em;text-decoration:none;text-transform:uppercase;}
    .nut-home-btn:hover{background:rgba(200,100,10,0.22);}
    .nut-home-title{font-weight:900;font-size:13px;letter-spacing:.08em;color:var(--gold);}
    .wrap{max-width:520px;margin:0 auto;padding:24px 16px 48px;}
    .card{background:rgba(12,8,4,0.88);border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:0 16px 50px rgba(0,0,0,0.35);}
    .profile-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;}
    .avatar{width:88px;height:88px;border-radius:16px;overflow:hidden;border:2px solid rgba(200,169,110,0.35);flex-shrink:0;background:rgba(8,5,2,0.7);}
    .avatar img{width:100%;height:100%;object-fit:cover;}
    .profile-name{font-size:26px;font-weight:900;line-height:1.15;margin-bottom:4px;}
    .profile-id{font-family:ui-monospace,monospace;font-size:11px;color:var(--gold-bright);letter-spacing:.08em;margin-bottom:6px;}
    .profile-you{font-size:10px;color:var(--green);letter-spacing:.12em;text-transform:uppercase;font-weight:800;}
    .profile-bio{font-size:14px;color:var(--muted);font-style:italic;line-height:1.45;margin-bottom:14px;}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
    .stat{padding:12px 8px;border-radius:12px;background:rgba(8,5,2,0.55);border:1px solid rgba(200,169,110,0.12);text-align:center;}
    .stat-n{font-size:22px;font-weight:900;color:var(--gold-bright);}
    .stat-l{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
    .rank-line{font-size:13px;color:var(--muted);margin-bottom:16px;}
    .rank-line strong{color:var(--cream);}
    .actions{display:flex;gap:8px;flex-wrap:wrap;}
    .btn{padding:10px 14px;border-radius:12px;border:1px solid rgba(200,169,110,0.35);background:rgba(200,100,10,0.16);color:var(--gold-bright);font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block;}
    .btn.ghost{background:rgba(8,5,2,0.7);color:var(--muted);}
    .loading{text-align:center;padding:40px;color:var(--muted);}
    .err{text-align:center;padding:40px;color:#ffb0b0;}
    .profile-dataset{background:rgba(8,5,2,0.7);border:1px solid rgba(200,169,110,0.18);border-radius:12px;padding:12px 14px;margin-bottom:14px;text-align:center;}
    .profile-dataset-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .profile-dataset-val{font-size:18px;font-weight:900;font-family:ui-monospace,monospace;color:var(--gold-bright);letter-spacing:.02em;}
    .profile-dataset-sub{font-size:10px;color:var(--muted);margin-top:4px;}
    .profile-dataset-sub a{color:var(--gold);text-decoration:none;}
  </style>
</head>
<body>
  <header class="nut-home-bar">
    <a href="/" class="nut-home-btn">← Home</a>
    <span class="nut-home-title">$NUT Profile</span>
  </header>

  <div class="wrap">
    <div class="card" id="profileCard">
      <div class="loading">Loading profile...</div>
    </div>
  </div>

  <script src="./profiles.js"></script>
  <script src="./npcs.js"></script>
  <script>
    const SUPABASE_URL = 'https://ynzbwnlltqrprnrlbtna.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluemJ3bmxsdHFycHJucmxidG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzQyNDQsImV4cCI6MjA5NTMxMDI0NH0.W7R5bD7F7XWpW0HEK9rgcMYsIbhF2caq57d0grZZjqA';
    const SITE_URL = 'https://nutcoin-alpha.vercel.app';
    const AV_URLS = [
      'https://api.dicebear.com/9.x/pixel-art/svg?seed=NutDegen&size=128',
      'https://api.dicebear.com/9.x/pixel-art/svg?seed=NutChad&size=128',
      'https://api.dicebear.com/9.x/pixel-art/svg?seed=NutWagmi&size=128',
      'https://api.dicebear.com/9.x/pixel-art/svg?seed=NutMoon&size=128',
      'https://api.dicebear.com/9.x/pixel-art/svg?seed=NutDiamond&size=128',
      'https://api.dicebear.com/9.x/pixel-art/svg?seed=NutApe&size=128',

      'https://api.dicebear.com/9.x/pixel-art/svg?seed=NutFren&size=128',
      'https://api.dicebear.com/9.x/pixel-art/svg?seed=NutAlpha&size=128',

      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot1&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot2&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot3&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot4&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot5&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot6&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot7&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot8&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot9&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot10&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot11&size=128',
      'https://api.dicebear.com/9.x/bottts/svg?seed=NutBot12&size=128',
      'https://api.dicebear.com/9.x/adventurer/svg?seed=NutAdv1&size=128',
      'https://api.dicebear.com/9.x/adventurer/svg?seed=NutAdv2&size=128',
      'https://api.dicebear.com/9.x/adventurer/svg?seed=NutAdv3&size=128',
      'https://api.dicebear.com/9.x/adventurer/svg?seed=NutAdv4&size=128',
      'https://api.dicebear.com/9.x/adventurer/svg?seed=NutAdv5&size=128',
      'https://api.dicebear.com/9.x/adventurer/svg?seed=NutAdv6&size=128',
      'https://api.dicebear.com/9.x/adventurer/svg?seed=NutAdv7&size=128',
      'https://api.dicebear.com/9.x/adventurer/svg?seed=NutAdv8&size=128',
    ];

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function avFor(sid) {
      const mySid = localStorage.getItem('nut_session_id_v1');
      if (sid === mySid) {
        try {
          const s = JSON.parse(localStorage.getItem('nut_avatar_v1') || 'null');
          if (s && typeof s.idx === 'number' && s.idx >= 0 && s.idx < AV_URLS.length) {
            return AV_URLS[s.idx];
          }
        } catch (_) {}
      }
      let h = 5381;
      for (let i = 0; i < (sid||'').length; i++) h = ((h * 33) ^ sid.charCodeAt(i)) & 0x7fffffff;
      return AV_URLS[h % AV_URLS.length];
    }

    function mySessionId() {
      return localStorage.getItem('nut_session_id_v1') || '';
    }

    async function loadProfile() {
      const card = document.getElementById('profileCard');
      const targetSid = NutProfiles.parseProfileParam();
      if (!targetSid || targetSid.length < 8) {
        card.innerHTML = '<div class="err">Invalid profile link.</div>';
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const ref = params.get('ref');
      const mySid = mySessionId();
      if (ref && ref.length >= 8 && ref !== mySid && !localStorage.getItem('nut_ref_by_v1')) {
        localStorage.setItem('nut_ref_by_v1', ref);
      }

      const isYou = targetSid === mySid;
      let nickname = null;
      let deeds = 0;
      let rank = null;
      let resolvedBio = '';

      // ── NPC fast-path: resolve from local NPCS data ─────────────
      const npcObj = window.NutNPCs && window.NutNPCs.isNPCSid(targetSid)
        ? window.NutNPCs.getNPCBySid(targetSid)
        : null;

      if (npcObj) {
        nickname     = npcObj.name;
        deeds        = window.NutNPCs.allTime(npcObj);
        resolvedBio  = npcObj.bio;
        // Attempt to improve deeds count from leaderboard if available
        if (window.supabase && SUPABASE_URL && SUPABASE_KEY) {
          try {
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data, error } = await db.rpc('leaderboard');
            if (!error && data) {
              const idx = data.findIndex(r => r.session_id === targetSid);
              if (idx >= 0) {
                rank  = idx + 1;
                deeds = Math.max(deeds, Number(data[idx].deeds || 0));
              }
            }
          } catch (_) {}
        }
      } else {
        // ── Real user path ──────────────────────────────────────────
        if (window.supabase && SUPABASE_URL && SUPABASE_KEY) {
          try {
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data, error } = await db.rpc('leaderboard');
            if (!error && data) {
              const idx = data.findIndex(r => r.session_id === targetSid);
              if (idx >= 0) {
                rank     = idx + 1;
                nickname = data[idx].nickname;
                deeds    = Number(data[idx].deeds || 0);
              }
            }
          } catch (_) {}
        }

        if (isYou) {
          const localNick = localStorage.getItem('nut_nickname_v1');
          if (localNick) nickname = localNick;
          const localAll = parseInt(localStorage.getItem('nut_alltime_v1') || '0', 10);
          if (localAll > deeds) deeds = localAll;
        }

        resolvedBio = isYou ? (localStorage.getItem('nut_bio_v1') || '') : '';
      }

      const displayName = nickname || NutProfiles.anonName(targetSid);
      const nutId = NutProfiles.nutDisplayId(targetSid);
      const bio = resolvedBio;
      const _todayStr = (() => {
        const t = new Date();
        return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
      })();
      const today = npcObj
        ? window.NutNPCs.todayCount(npcObj, _todayStr)
        : isYou
          ? parseInt(localStorage.getItem('nut_today_' + _todayStr) || '0', 10)
          : '—';
      const streak = npcObj
        ? Math.min(npcObj.joinDays, 7 + (npcObj.seed % 60))
        : isYou
          ? parseInt(localStorage.getItem('nut_streak_v1') || '0', 10)
          : '—';
      const crew = isYou ? (localStorage.getItem('nut_crew_v1') || '—') : '—';

      document.title = `${displayName} · $NUT`;

      card.innerHTML = `
        <div class="profile-top">
          <div class="avatar"><img src="${avFor(targetSid)}" alt=""/></div>
          <div>
            <div class="profile-name">${esc(displayName)}</div>
            <div class="profile-id">${esc(nutId)}</div>
            ${isYou ? '<div class="profile-you">This is you</div>' : ''}
          </div>
        </div>
        ${bio ? `<div class="profile-bio">&ldquo;${esc(bio)}&rdquo;</div>` : ''}
        <div class="rank-line">${rank ? `Leaderboard rank <strong>#${rank}</strong> · ` : ''}<strong>${deeds.toLocaleString()}</strong> all-time nuts</div>
        <div class="stats">
          <div class="stat"><div class="stat-n">${typeof today === 'number' ? today.toLocaleString() : today}</div><div class="stat-l">Today</div></div>
          <div class="stat"><div class="stat-n">${deeds.toLocaleString()}</div><div class="stat-l">All time</div></div>
          <div class="stat"><div class="stat-n">${typeof streak === 'number' ? streak : streak}</div><div class="stat-l">Streak</div></div>
        </div>
        <div class="profile-dataset">
          <div class="profile-dataset-label">Share of 2014-2026 global orgasm record</div>
          <div class="profile-dataset-val">${deeds > 0 ? (deeds / 4_998_000_000_000 * 100).toFixed(10) : '0.0000000000'}%</div>
          <div class="profile-dataset-sub">of 4,998,000,000,000 documented orgasms · all activities · <a href="/whitepaper.html">methodology</a></div>
        </div>
        <div class="actions">
          <button type="button" class="btn" onclick="shareThis()">Share profile</button>
          ${isYou ? '<a href="/" class="btn ghost">Log nuts ↗</a>' : '<a href="/" class="btn ghost">Join $NUT ↗</a>'}
        </div>`;

      window._profileSid = targetSid;
      window._profileName = displayName;
    }

    function todayKey() {
      const t = new Date();
      return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    }

    function shareThis() {
      NutProfiles.shareProfile(window._profileSid, window._profileName);
    }

    loadProfile();
  </script>
</body>
</html>
