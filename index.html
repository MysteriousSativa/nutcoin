<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>$NUT Clicker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
<script src="./nutrank.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050301;
  --gold:#C8A96E;
  --gold-b:#f6c90e;
  --text:#EDE8DF;
  --muted:#7A6855;
  --green:#4EC97A;
  --surface:rgba(200,169,110,0.04);
  --mono:'Space Mono',monospace;
  --sans:'Inter',system-ui,sans-serif;
}
html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  user-select:none;
  overflow-x:hidden;
}
#app{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:20px 16px 56px;
  max-width:480px;
  margin:0 auto;
}

/* ── Header ── */
#hdr{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}
.brand{font-size:18px;font-weight:900;letter-spacing:.06em;color:var(--gold);}
#rankBadge{display:flex;align-items:center;}

/* ── Counter ── */
#counterArea{text-align:center;margin-bottom:30px;width:100%;}
#counter{
  font-family:var(--mono);
  font-size:clamp(44px,14vw,82px);
  font-weight:700;
  color:var(--gold);
  line-height:1;
  text-shadow:0 0 40px rgba(200,169,110,0.3);
  transition:text-shadow .1s;
}
#counter.lit{text-shadow:0 0 64px rgba(246,201,14,0.9),0 0 24px rgba(200,169,110,0.6);}
#counterSub{
  font-size:11px;
  font-weight:800;
  letter-spacing:.2em;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:2px;
}
#progress{margin:8px 4px 0;font-size:11px;}

/* ── Click zone ── */
#clickZone{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  width:230px;
  height:230px;
  cursor:pointer;
  touch-action:none;
  flex-shrink:0;
  border-radius:50%;
  outline:none;
}
#clickZone:focus-visible{box-shadow:0 0 0 3px rgba(200,169,110,0.4);}

.ring{
  position:absolute;
  inset:8px;
  border-radius:50%;
  border:1.5px solid rgba(200,169,110,0.18);
  animation:ringPulse 2.5s ease-in-out infinite;
}
.ring2{
  position:absolute;
  inset:26px;
  border-radius:50%;
  border:1px solid rgba(200,169,110,0.09);
  animation:ringPulse 2.5s ease-in-out infinite 1s;
}
@keyframes ringPulse{
  0%,100%{transform:scale(1);opacity:.35;}
  50%{transform:scale(1.07);opacity:.8;}
}

#nutWrap{
  animation:bob 3.2s ease-in-out infinite;
  pointer-events:none;
  z-index:1;
}
@keyframes bob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}
#nut{
  font-size:128px;
  line-height:1;
  display:block;
  filter:drop-shadow(0 8px 28px rgba(200,169,110,0.22));
  transition:transform .1s cubic-bezier(.2,.8,.4,1), filter .1s;
}
#nut.pop{
  transform:scale(.82);
  filter:drop-shadow(0 2px 44px rgba(246,201,14,0.7)) brightness(1.25);
}

#burst{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2.5px solid var(--gold-b);
  opacity:0;
  pointer-events:none;
}
#burst.fire{animation:burst .38s ease-out forwards;}
@keyframes burst{
  0%{transform:scale(.55);opacity:.85;}
  100%{transform:scale(1.55);opacity:0;}
}

/* ── Tap hint ── */
#tapHint{
  font-size:10px;
  letter-spacing:.14em;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:10px;
  opacity:.6;
}

/* ── Floating +1 ── */
.float{
  position:fixed;
  font-family:var(--mono);
  font-weight:700;
  font-size:22px;
  color:var(--gold-b);
  text-shadow:0 0 12px rgba(246,201,14,.5);
  pointer-events:none;
  z-index:9999;
  animation:floatUp .85s ease-out forwards;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-72px) scale(.6);opacity:0;}
}

/* ── Nickname row ── */
#nickRow{
  display:flex;
  gap:6px;
  width:100%;
  margin-top:24px;
}
#nickInput{
  flex:1;
  background:var(--surface);
  border:1px solid rgba(200,169,110,0.14);
  border-radius:8px;
  padding:9px 12px;
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  outline:none;
  user-select:text;
}
#nickInput::placeholder{color:var(--muted);}
#nickInput:focus{border-color:rgba(200,169,110,0.42);}
#nickSave{
  background:rgba(200,169,110,0.1);
  border:1px solid rgba(200,169,110,0.28);
  border-radius:8px;
  padding:9px 14px;
  color:var(--gold);
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  cursor:pointer;
  white-space:nowrap;
  font-family:var(--sans);
}
#nickSave:hover{background:rgba(200,169,110,0.2);}

/* ── Leaderboard ── */
#lbWrap{width:100%;margin-top:28px;}
#lbHead{
  font-size:10px;
  font-weight:900;
  letter-spacing:.15em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:8px;
}
.lbr{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:8px;
  background:var(--surface);
  border:1px solid rgba(200,169,110,0.07);
  margin-bottom:4px;
}
.lbr.you{
  background:rgba(78,201,122,0.07);
  border-color:rgba(78,201,122,0.28);
}
.lbr-rank{
  width:24px;
  text-align:center;
  flex-shrink:0;
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
}
.lbr-name{
  flex:1;
  font-size:13px;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.lbr.you .lbr-name{color:var(--green);}
.lbr-num{
  font-family:var(--mono);
  font-size:12px;
  color:var(--gold);
  flex-shrink:0;
}
#lbMsg{
  font-size:12px;
  color:var(--muted);
  text-align:center;
  padding:16px 0;
}

/* ── Casino shortcut ── */
#casinoBtn{
  margin-top:28px;
  font-size:11px;
  color:var(--muted);
  background:none;
  border:1px solid rgba(200,169,110,0.12);
  border-radius:8px;
  padding:8px 18px;
  cursor:pointer;
  letter-spacing:.07em;
  font-family:var(--sans);
  transition:color .15s,border-color .15s;
}
#casinoBtn:hover{color:var(--gold);border-color:rgba(200,169,110,0.35);}

/* ── Toast ── */
#toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(60px);
  background:rgba(22,16,8,0.95);
  border:1px solid rgba(200,169,110,0.3);
  border-radius:10px;
  padding:10px 18px;
  font-size:12px;
  color:var(--gold);
  font-family:var(--mono);
  transition:transform .25s ease;
  pointer-events:none;
  z-index:1000;
  white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

  <div id="hdr">
    <div class="brand">🥜 $NUT</div>
    <div id="rankBadge"></div>
  </div>

  <div id="counterArea">
    <div id="counter">0</div>
    <div id="counterSub">NUTS</div>
    <div id="progress"></div>
  </div>

  <div id="clickZone" tabindex="0" role="button" aria-label="Click to earn nuts">
    <div class="ring"></div>
    <div class="ring2"></div>
    <div id="nutWrap"><span id="nut">🥜</span></div>
    <div id="burst"></div>
  </div>
  <div id="tapHint">tap to earn</div>

  <div id="nickRow">
    <input id="nickInput" type="text" placeholder="set your name..." maxlength="20" autocomplete="off" spellcheck="false">
    <button id="nickSave">SAVE</button>
  </div>

  <div id="lbWrap">
    <div id="lbHead">Global Leaderboard</div>
    <div id="lbRows"><div id="lbMsg">Loading...</div></div>
  </div>

  <button id="casinoBtn" onclick="window.location='./casino-app.html'">Open Casino</button>

</div>

<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────
const SUPABASE_URL = 'https://ynzbwnlltqrprnrlbtna.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluemJ3bmxsdHFycHJucmxidG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzQyNDQsImV4cCI6MjA5NTMxMDI0NH0.W7R5bD7F7XWpW0HEK9rgcMYsIbhF2caq57d0grZZjqA';
const KEY_NUTS = 'nut_alltime_v1';
const KEY_SID  = 'nut_sid_v1';
const KEY_NICK = 'nut_nickname_v1';
const SYNC_CD  = 600_000; // 10 min server cooldown

// ── Supabase ───────────────────────────────────────────────────
let db = null;
try {
  if (window.supabase) db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {}

// ── State ──────────────────────────────────────────────────────
let nuts     = parseInt(localStorage.getItem(KEY_NUTS) || '0', 10) || 0;
let sid      = localStorage.getItem(KEY_SID);
if (!sid) { sid = crypto.randomUUID(); localStorage.setItem(KEY_SID, sid); }
let nickname = localStorage.getItem(KEY_NICK) || '';
let lastSync = 0;

// ── DOM ────────────────────────────────────────────────────────
const counterEl  = document.getElementById('counter');
const progressEl = document.getElementById('progress');
const rankBadge  = document.getElementById('rankBadge');
const nutEl      = document.getElementById('nut');
const burstEl    = document.getElementById('burst');
const nickInput  = document.getElementById('nickInput');
const toastEl    = document.getElementById('toast');

if (nickname) nickInput.value = nickname;

// ── Render ─────────────────────────────────────────────────────
function render() {
  counterEl.textContent = nuts.toLocaleString();
  if (window.NutRank) {
    rankBadge.innerHTML  = NutRank.getBadgeHTML(nuts, true);
    progressEl.innerHTML = NutRank.getLevelProgressHTML(nuts);
  }
}
render();

// ── Toast ──────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

// ── Floating +1 ────────────────────────────────────────────────
function spawnFloat(cx, cy) {
  const el = document.createElement('span');
  el.className = 'float';
  el.textContent = '+1';
  el.style.left = (cx - 14) + 'px';
  el.style.top  = (cy - 20) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ── Click handler ──────────────────────────────────────────────
const zone = document.getElementById('clickZone');

zone.addEventListener('pointerdown', e => {
  e.preventDefault();

  nuts++;
  localStorage.setItem(KEY_NUTS, nuts);
  render();

  // Nut pop
  nutEl.classList.add('pop');
  setTimeout(() => nutEl.classList.remove('pop'), 130);

  // Counter flash
  counterEl.classList.add('lit');
  setTimeout(() => counterEl.classList.remove('lit'), 160);

  // Burst ring
  burstEl.classList.remove('fire');
  void burstEl.offsetWidth;
  burstEl.classList.add('fire');

  // Float label
  spawnFloat(e.clientX, e.clientY);

  // Milestone celebrations
  if (nuts === 1)    toast('First nut! 🥜');
  if (nuts === 10)   toast('10 nuts! Getting there');
  if (nuts === 50)   toast('50 nuts! 🌿 Sprout unlocked');
  if (nuts === 100)  toast('100 nuts! 🌰 Acorn rank');
  if (nuts === 250)  toast('250 nuts! 🥜 Nutling level');
  if (nuts === 500)  toast('500 nuts! 🐿 Squirrel rank');
  if (nuts === 1000) toast('1000 nuts! ⚡ NUT Scout!');
  if (nuts === 2500) toast('2500 nuts! 🏆 Veteran status');
  if (nuts === 5000) toast('5000 nuts! 💎 Diamond rank');
  if (nuts === 10000)toast('10000 nuts! 👑 NUT King!');

  scheduleSync();
});

// Keyboard support
zone.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    const r = zone.getBoundingClientRect();
    zone.dispatchEvent(new PointerEvent('pointerdown', {
      bubbles: true,
      clientX: r.left + r.width / 2,
      clientY: r.top + r.height / 2,
    }));
  }
});

// ── Supabase sync ──────────────────────────────────────────────
let syncTimer = null;
function scheduleSync() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncUp, 5000);
}

async function syncUp() {
  if (!db) return;
  if (Date.now() - lastSync < SYNC_CD) return;
  const date = new Date().toISOString().slice(0, 10);
  try {
    let { data, error } = await db.rpc('log_nut', {
      p_session_id: sid,
      p_nickname:   nickname || null,
      p_deed_date:  date,
      p_nut_type:   'nut',
      p_points:     1,
    });
    if (error && /Could not find/i.test(String(error.message || ''))) {
      ({ data, error } = await db.rpc('log_nut', {
        p_session_id: sid,
        p_nickname:   nickname || null,
        p_deed_date:  date,
      }));
    }
    if (!error) {
      lastSync = Date.now();
      fetchLb();
    }
  } catch(e) {}
}

// ── Nickname ───────────────────────────────────────────────────
function saveNick() {
  const v = nickInput.value.trim().slice(0, 20);
  if (!v) return;
  nickname = v;
  localStorage.setItem(KEY_NICK, nickname);
  toast('Name saved');
  scheduleSync();
}
document.getElementById('nickSave').addEventListener('click', saveNick);
nickInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveNick(); });

// ── Leaderboard ────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fetchLb() {
  const el = document.getElementById('lbRows');
  if (!db) {
    el.innerHTML = '<div id="lbMsg">No Supabase connection.</div>';
    return;
  }
  const { data, error } = await db.rpc('leaderboard');
  if (error || !data || !data.length) {
    el.innerHTML = '<div id="lbMsg">No entries yet. Be the first.</div>';
    return;
  }
  const icons = ['🥇','🥈','🥉'];
  let html = '';
  data.slice(0, 15).forEach((r, i) => {
    const isYou  = r.session_id === sid;
    const rankEl = i < 3 ? icons[i] : String(i + 1);
    const name   = r.nickname || ('anon ' + String(r.session_id || '').slice(0, 6));
    const badge  = window.NutRank ? NutRank.getBadgeHTML(r.deeds, true) : '';
    html += `<div class="lbr${isYou ? ' you' : ''}">
      <span class="lbr-rank">${rankEl}</span>
      <span class="lbr-name">${esc(name)}</span>
      ${badge}
      <span class="lbr-num">${Number(r.deeds).toLocaleString()}</span>
    </div>`;
  });
  el.innerHTML = html;
}

fetchLb();
setInterval(fetchLb, 30_000);
</script>
</body>
</html>
