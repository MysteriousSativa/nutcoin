<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>$NUT Clicker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
<script src="./nutrank.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050301;--gold:#C8A96E;--gold-b:#f6c90e;
  --text:#EDE8DF;--muted:#7A6855;--green:#4EC97A;
  --surface:rgba(200,169,110,0.04);
  --mono:'Space Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);user-select:none;overflow-x:hidden;}
#app{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px 16px 56px;max-width:480px;margin:0 auto;}

/* Header */
#hdr{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.brand{font-size:18px;font-weight:900;letter-spacing:.06em;color:var(--gold);}
#rankBadge{display:flex;align-items:center;}

/* Counter */
#counterArea{text-align:center;margin-bottom:30px;width:100%;}
#counter{
  font-family:var(--mono);font-size:clamp(44px,14vw,82px);font-weight:700;
  color:var(--gold);line-height:1;text-shadow:0 0 40px rgba(200,169,110,0.3);transition:text-shadow .1s;
}
#counter.lit{text-shadow:0 0 64px rgba(246,201,14,0.9),0 0 24px rgba(200,169,110,0.6);}
#counterSub{font-size:11px;font-weight:800;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-top:2px;}
#progress{margin:8px 4px 0;font-size:11px;}

/* Click zone */
#clickZone{
  position:relative;display:flex;align-items:center;justify-content:center;
  width:230px;height:230px;cursor:pointer;touch-action:none;flex-shrink:0;
  border-radius:50%;outline:none;
}
#clickZone:focus-visible{box-shadow:0 0 0 3px rgba(200,169,110,0.4);}
.ring{
  position:absolute;inset:8px;border-radius:50%;
  border:1.5px solid rgba(200,169,110,0.18);
  animation:ringPulse 2.5s ease-in-out infinite;
}
.ring2{
  position:absolute;inset:26px;border-radius:50%;
  border:1px solid rgba(200,169,110,0.09);
  animation:ringPulse 2.5s ease-in-out infinite 1s;
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.35;}50%{transform:scale(1.07);opacity:.8;}}
#nutWrap{animation:bob 3.2s ease-in-out infinite;pointer-events:none;z-index:1;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
#nut{
  font-size:128px;line-height:1;display:block;
  filter:drop-shadow(0 8px 28px rgba(200,169,110,0.22));
  transition:transform .1s cubic-bezier(.2,.8,.4,1),filter .1s;
}
#nut.pop{transform:scale(.82);filter:drop-shadow(0 2px 44px rgba(246,201,14,0.7)) brightness(1.25);}
#burst{
  position:absolute;inset:0;border-radius:50%;
  border:2.5px solid var(--gold-b);opacity:0;pointer-events:none;
}
#burst.fire{animation:burst .38s ease-out forwards;}
@keyframes burst{0%{transform:scale(.55);opacity:.85;}100%{transform:scale(1.55);opacity:0;}}

/* Tap hint */
#tapHint{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:10px;opacity:.6;}

/* Float +1 */
.float{
  position:fixed;font-family:var(--mono);font-weight:700;font-size:22px;
  color:var(--gold-b);text-shadow:0 0 12px rgba(246,201,14,.5);
  pointer-events:none;z-index:9999;animation:floatUp .85s ease-out forwards;
}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-72px) scale(.6);opacity:0;}}

/* Nick row */
#nickRow{display:flex;gap:6px;width:100%;margin-top:24px;}
#nickInput{
  flex:1;background:var(--surface);border:1px solid rgba(200,169,110,0.14);
  border-radius:8px;padding:9px 12px;color:var(--text);
  font-family:var(--mono);font-size:12px;outline:none;user-select:text;
}
#nickInput::placeholder{color:var(--muted);}
#nickInput:focus{border-color:rgba(200,169,110,0.42);}
#nickSave{
  background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.28);
  border-radius:8px;padding:9px 14px;color:var(--gold);font-size:10px;
  font-weight:900;letter-spacing:.08em;cursor:pointer;white-space:nowrap;font-family:var(--sans);
}
#nickSave:hover{background:rgba(200,169,110,0.2);}

/* Leaderboard */
#lbWrap{width:100%;margin-top:28px;}
#lbHead{
  font-size:10px;font-weight:900;letter-spacing:.15em;color:var(--muted);
  text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.lb-live{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px rgba(78,201,122,0.8);
  animation:livePulse 1.4s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.lbr{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:8px;background:var(--surface);
  border:1px solid rgba(200,169,110,0.07);margin-bottom:4px;
  transition:background .4s,border-color .4s;
}
.lbr.you{background:rgba(78,201,122,0.07);border-color:rgba(78,201,122,0.28);}
.lbr.rose{background:rgba(78,201,122,0.15)!important;border-color:rgba(78,201,122,0.4)!important;}
.lbr-rank{width:24px;text-align:center;flex-shrink:0;font-family:var(--mono);font-size:11px;color:var(--muted);}
.lbr-name{flex:1;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lbr.you .lbr-name{color:var(--green);}
.lbr-num{font-family:var(--mono);font-size:12px;color:var(--gold);flex-shrink:0;}
.lbr-delta{font-family:var(--mono);font-size:10px;color:var(--green);flex-shrink:0;opacity:0;transition:opacity .3s;}
.lbr-delta.show{opacity:1;}
#lbMsg{font-size:12px;color:var(--muted);text-align:center;padding:16px 0;}

/* Casino button */
#casinoBtn{
  margin-top:28px;font-size:11px;color:var(--muted);background:none;
  border:1px solid rgba(200,169,110,0.12);border-radius:8px;padding:8px 18px;
  cursor:pointer;letter-spacing:.07em;font-family:var(--sans);
  transition:color .15s,border-color .15s;
}
#casinoBtn:hover{color:var(--gold);border-color:rgba(200,169,110,0.35);}

/* Toast */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(22,16,8,0.95);border:1px solid rgba(200,169,110,0.3);
  border-radius:10px;padding:10px 18px;font-size:12px;color:var(--gold);
  font-family:var(--mono);transition:transform .25s ease;pointer-events:none;
  z-index:1000;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

  <div id="hdr">
    <div class="brand">🥜 $NUT</div>
    <div id="rankBadge"></div>
  </div>

  <div id="counterArea">
    <div id="counter">0</div>
    <div id="counterSub">NUTS</div>
    <div id="progress"></div>
  </div>

  <div id="clickZone" tabindex="0" role="button" aria-label="Click to earn nuts">
    <div class="ring"></div>
    <div class="ring2"></div>
    <div id="nutWrap"><span id="nut">🥜</span></div>
    <div id="burst"></div>

  </div>

  <div id="lbWrap">
    <div id="lbHead">
      <div class="lb-live"></div>
      Live Leaderboard
    </div>
    <div id="lbRows"><div id="lbMsg">Loading...</div></div>
  </div>

  <button id="casinoBtn" onclick="window.location='./casino-app.html'">Open Casino</button>

</div>
<div id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────
const KEY_NUTS     = 'nut_alltime_v1'
const KEY_SID      = 'nut_sid_v1'
const KEY_NICK     = 'nut_nickname_v1'
const KEY_NPC      = 'nut_npc_v2'

const SUPABASE_URL = 'https://ynzbwnlltqrprnrlbtna.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluemJ3bmxsdHFycHJucmxidG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzQyNDQsImV4cCI6MjA5NTMxMDI0NH0.W7R5bD7F7XWpW0HEK9rgcMYsIbhF2caq57d0grZZjqA'

// ── Supabase ────────────────────────────────────────────────────
let db = null
try { if (window.supabase) db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) } catch(e) {}

// ── State ───────────────────────────────────────────────────────
let nuts     = parseInt(localStorage.getItem(KEY_NUTS)||'0',10)||0
let sid      = localStorage.getItem(KEY_SID)
if (!sid) { sid = crypto.randomUUID(); localStorage.setItem(KEY_SID, sid) }
let nickname = localStorage.getItem(KEY_NICK)||''
let lastSync = 0

// ── DOM ─────────────────────────────────────────────────────────
const counterEl  = document.getElementById('counter')
const progressEl = document.getElementById('progress')
const rankBadge  = document.getElementById('rankBadge')
const nutEl      = document.getElementById('nut')
const burstEl    = document.getElementById('burst')
const nickInput  = document.getElementById('nickInput')
const toastEl    = document.getElementById('toast')
if (nickname) nickInput.value = nickname

// ── Render ───────────────────────────────────────────────────────
function render() {
  counterEl.textContent = nuts.toLocaleString()
  if (window.NutRank) {
    rankBadge.innerHTML  = NutRank.getBadgeHTML(nuts, true)
    progressEl.innerHTML = NutRank.getLevelProgressHTML(nuts)
  }
}
render()

// ── Toast ────────────────────────────────────────────────────────
let toastTimer = null
function toast(msg) {
  toastEl.textContent = msg
  toastEl.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400)
}

// ── Float +1 ─────────────────────────────────────────────────────
function spawnFloat(cx, cy) {
  const el = document.createElement('span')
  el.className = 'float'
  el.textContent = '+1'
  el.style.left = (cx - 14) + 'px'
  el.style.top  = (cy - 20) + 'px'
  document.body.appendChild(el)
  el.addEventListener('animationend', () => el.remove())
}

// ── Click Handler ────────────────────────────────────────────────
const zone = document.getElementById('clickZone')

zone.addEventListener('pointerdown', e => {
  e.preventDefault()
  nuts++
  localStorage.setItem(KEY_NUTS, nuts)
  render()

  nutEl.classList.add('pop')
  setTimeout(() => nutEl.classList.remove('pop'), 130)
  counterEl.classList.add('lit')
  setTimeout(() => counterEl.classList.remove('lit'), 160)
  burstEl.classList.remove('fire')
  void burstEl.offsetWidth
  burstEl.classList.add('fire')
  spawnFloat(e.clientX, e.clientY)

  if (nuts===1)    toast('First nut! 🥜')
  if (nuts===10)   toast('10 nuts! Getting there')
  if (nuts===50)   toast('50 nuts! 🌿 Sprout rank')
  if (nuts===100)  toast('100 nuts! 🌰 Acorn rank')
  if (nuts===250)  toast('250 nuts! 🥜 Nutling rank')
  if (nuts===500)  toast('500 nuts! 🐿 Squirrel rank')
  if (nuts===1000) toast('1000 nuts! ⚡ NUT Scout!')
  if (nuts===2500) toast('2500 nuts! 🏆 Veteran status')
  if (nuts===5000) toast('5000 nuts! 💎 Diamond rank')

  scheduleSync()
  // Update NPC tick so leaderboard reacts quickly
  tickNPCsAndRender()
})

zone.addEventListener('keydown', e => {
  if (e.key===' '||e.key==='Enter') {
    e.preventDefault()
    const r = zone.getBoundingClientRect()
    zone.dispatchEvent(new PointerEvent('pointerdown', { bubbles:true, clientX:r.left+r.width/2, clientY:r.top+r.height/2 }))
  }
})

// ── Supabase Sync ─────────────────────────────────────────────────
let syncTimer = null
function scheduleSync() {
  clearTimeout(syncTimer)
  syncTimer = setTimeout(syncUp, 5000)
}
async function syncUp() {
  if (!db || Date.now()-lastSync < 600_000) return
  const date = new Date().toISOString().slice(0,10)
  try {
    let {data,error} = await db.rpc('log_nut',{ p_session_id:sid, p_nickname:nickname||null, p_deed_date:date, p_nut_type:'nut', p_points:1 })
    if (error && /Could not find/i.test(String(error.message||''))) {
      ({data,error} = await db.rpc('log_nut',{ p_session_id:sid, p_nickname:nickname||null, p_deed_date:date }))
    }
    if (!error) lastSync = Date.now()
  } catch(e) {}
}

// ── Nickname ──────────────────────────────────────────────────────
function saveNick() {
  const v = nickInput.value.trim().slice(0,20)
  if (!v) return
  nickname = v
  localStorage.setItem(KEY_NICK, nickname)
  toast('Name saved')
  scheduleSync()
  tickNPCsAndRender()
}
document.getElementById('nickSave').addEventListener('click', saveNick)
nickInput.addEventListener('keydown', e => { if (e.key==='Enter') saveNick() })

// ══════════════════════════════════════════════════════════════════
// NPC LIVE LEADERBOARD SYSTEM
// ══════════════════════════════════════════════════════════════════

// Roster: [name, startNuts, personality]
// personality controls click rate and session pattern
// 'fast'    = 1000-4000ms per click, sessions 5-30 min
// 'regular' = 8000-45000ms per click, sessions 30min-4hr
// 'casual'  = 90000-600000ms per click, sessions 1-8hr
// 'burst'   = fast for short bursts, then long pauses
const ROSTER = [
  ['NutLegend69',  3820, 'regular'],
  ['WalletNutter', 2145, 'casual' ],
  ['NutBaron',     1680, 'regular'],
  ['hodlMyNuts',   1240, 'casual' ],
  ['DEEZNUTS99',    895, 'fast'   ],
  ['NUTcasso',      762, 'casual' ],
  ['CryptoNutz',    554, 'regular'],
  ['GOATGANG',      448, 'fast'   ],
  ['NutGoblin',     218, 'burst'  ],
  ['clickerPRO',    143, 'fast'   ],
  ['NUTmaxxWars',    68, 'burst'  ],
  ['NutSavant',      52, 'regular'],
  ['nutmaxxer',      89, 'fast'   ],
  ['SeedProphet',    26, 'casual' ],
  ['squirrelgang',   19, 'regular'],
  ['ballsDeep',      13, 'burst'  ],
  ['seedboy',         9, 'casual' ],
  ['SQUIRREL_IRL',    5, 'regular'],
  ['anon_xxxxxx',     3, 'casual' ],
]

const H = 3600000, D = 86400000, M = 60000

function randRange(a, b) { return a + Math.random() * (b - a) }

function clickRate(personality) {
  if (personality==='fast')    return randRange(1000,  4000)
  if (personality==='regular') return randRange(8000,  45000)
  if (personality==='casual')  return randRange(90000, 600000)
  if (personality==='burst')   return Math.random()<0.2 ? randRange(800,2500) : randRange(30000,120000)
  return 10000
}

function sessionLen(personality) {
  if (personality==='fast')    return randRange(5*M,   30*M)
  if (personality==='regular') return randRange(30*M,  4*H)
  if (personality==='casual')  return randRange(1*H,   8*H)
  if (personality==='burst')   return randRange(10*M,  2*H)
  return H
}

// Heavy-tailed break distribution — mostly short, occasionally days-long
function breakLen(personality) {
  const r = Math.random()
  if (personality==='fast') {
    // Fast clickers take shorter breaks
    if (r < 0.55) return randRange(1*H,   8*H)
    if (r < 0.82) return randRange(8*H,   2*D)
    return randRange(2*D, 8*D)
  }
  if (r < 0.50) return randRange(2*H,   12*H)
  if (r < 0.78) return randRange(12*H,   3*D)
  if (r < 0.93) return randRange(3*D,    8*D)
  return randRange(8*D, 14*D)
}

// Initialize or load NPC state
let npcs = []

function initNPCState() {
  const now = Date.now()
  // Build from roster — each NPC gets a unique schedule seeded by position
  return ROSTER.map(([name, startNuts, personality], idx) => {
    // Stagger initial states: some active, some dormant, different phases
    const isActive = Math.random() < (personality==='fast'?0.45:personality==='regular'?0.3:0.15)
    const cr = clickRate(personality)
    // Offset each NPC's next event by a hash of its index to avoid synchrony
    const offset = ((idx * 7919) % 100) / 100  // 0-1 fraction
    return {
      name,
      nuts: startNuts + Math.floor(Math.random() * 20),
      personality,
      isActive,
      clickRate: cr,
      // If active, next click comes at a random point in the next click cycle
      nextClick: isActive ? now + cr * offset : 0,
      sessionEnd: isActive ? now + sessionLen(personality) * (0.3 + offset * 0.7) : 0,
      // If dormant, wake at varied future times
      nextWake: !isActive ? now + breakLen(personality) * (0.1 + offset * 0.9) : 0,
    }
  })
}

function loadNPCs() {
  try {
    const raw = localStorage.getItem(KEY_NPC)
    if (!raw) return null
    const parsed = JSON.parse(raw)
    // Validate basic structure and that roster matches
    if (!Array.isArray(parsed) || parsed.length !== ROSTER.length) return null
    return parsed
  } catch(e) { return null }
}

function saveNPCs() {
  try { localStorage.setItem(KEY_NPC, JSON.stringify(npcs)) } catch(e) {}
}

npcs = loadNPCs() || initNPCState()

// ── NPC Tick ────────────────────────────────────────────────────
// Returns true if any nut count changed
function tickNPCs() {
  const now = Date.now()
  let changed = false

  for (const npc of npcs) {
    if (!npc.isActive) {
      // Wake up?
      if (now >= npc.nextWake && npc.nextWake > 0) {
        npc.isActive    = true
        npc.clickRate   = clickRate(npc.personality)
        npc.sessionEnd  = now + sessionLen(npc.personality)
        npc.nextClick   = now + npc.clickRate * Math.random()
      }
    } else {
      // Process pending clicks since last nextClick timestamp
      if (now >= npc.nextClick) {
        // How many full click cycles have elapsed?
        const elapsed   = now - npc.nextClick
        const rawClicks = Math.floor(elapsed / npc.clickRate) + 1
        // Cap to prevent massive jumps after long page closure
        const clicks    = Math.min(rawClicks, 25)
        // Add personality jitter: ±25%
        const jitter    = 0.75 + Math.random() * 0.5
        const gained    = Math.max(1, Math.round(clicks * jitter))
        npc.nuts       += gained
        // Schedule next click from now (not from old timestamp) to prevent catch-up spiral
        npc.nextClick   = now + npc.clickRate * (0.8 + Math.random() * 0.4)
        changed         = true
      }

      // End session?
      if (now >= npc.sessionEnd) {
        npc.isActive  = false
        npc.nextWake  = now + breakLen(npc.personality)
        npc.nextClick = 0
      }
    }
  }

  if (changed) saveNPCs()
  return changed
}

// ── Leaderboard Render ────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// Track previous order to detect position changes
let prevOrder = []

function buildRows() {
  const userEntry = { name: nickname || ('anon ' + sid.slice(0,6)), nuts, isUser: true }
  const all = [
    ...npcs.map(n => ({ name:n.name, nuts:n.nuts, isUser:false, active:n.isActive })),
    userEntry
  ]
  all.sort((a,b) => b.nuts - a.nuts)
  return all
}

function renderLb() {
  const el = document.getElementById('lbRows')
  const rows = buildRows()
  const icons = ['🥇','🥈','🥉']

  // Detect who rose in rank since last render
  const roseSet = new Set()
  if (prevOrder.length) {
    rows.forEach((r,i) => {
      const prevIdx = prevOrder.indexOf(r.name)
      if (prevIdx > i) roseSet.add(r.name)  // lower index = higher rank
    })
  }
  prevOrder = rows.map(r => r.name)

  let html = ''
  rows.slice(0, 18).forEach((r, i) => {
    const isYou   = r.isUser
    const rankEl  = i < 3 ? icons[i] : String(i+1)
    const badge   = window.NutRank ? NutRank.getBadgeHTML(r.nuts, true) : ''
    const rose    = roseSet.has(r.name) ? ' rose' : ''
    const active  = r.active ? ' <span style="color:#4EC97A;font-size:8px;">●</span>' : ''
    const delta   = roseSet.has(r.name) ? `<span class="lbr-delta show">↑</span>` : `<span class="lbr-delta"></span>`
    html += `<div class="lbr${isYou?' you':''}${rose}" data-name="${esc(r.name)}">
      <span class="lbr-rank">${rankEl}</span>
      <span class="lbr-name">${esc(r.name)}${isYou?'':active}</span>
      ${badge}
      ${delta}
      <span class="lbr-num">${r.nuts.toLocaleString()}</span>
    </div>`
  })

  el.innerHTML = html || '<div id="lbMsg">Be the first!</div>'

  // Clear rose highlight after a short delay
  if (roseSet.size) {
    setTimeout(() => {
      document.querySelectorAll('.lbr.rose').forEach(r => r.classList.remove('rose'))
    }, 1200)
  }
}

function tickNPCsAndRender() {
  tickNPCs()
  renderLb()
}

// ── Boot & Timers ────────────────────────────────────────────────
// Initial render
tickNPCsAndRender()

// Fast tick every 6 seconds for smooth leaderboard movement
setInterval(tickNPCsAndRender, 6000)

// Also try to pull any real Supabase data and merge (optional)
async function fetchRealLb() {
  if (!db) return
  try {
    const {data, error} = await db.rpc('leaderboard')
    if (error || !data) return
    // Merge real players into display (they appear above NPCs of same nut count)
    // For now, just refresh the local render — Supabase sync happens via syncUp()
